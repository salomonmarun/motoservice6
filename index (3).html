@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.fade-enter{animation:fadeIn 0.2s ease forwards}

function Toast({toasts}){
  return(
    <div style={{position:"fixed",top:20,right:16,zIndex:999,display:"flex",flexDirection:"column",gap:8,maxWidth:300,pointerEvents:"none"}}>
      {toasts.map(t=>(
        <div key={t.id} style={{background:t.type==="error"?"#1a0808":t.type==="success"?"#081a0f":"#0d0d1a",border:`1px solid ${t.type==="error"?C.red:t.type==="success"?C.green:C.orange}`,borderRadius:12,padding:"12px 16px",boxShadow:"0 8px 32px rgba(0,0,0,0.4)",animation:`${t.leaving?"toastOut":"toastIn"} 0.3s ease forwards`,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{t.type==="error"?"❌":t.type==="success"?"✅":"ℹ️"}</span>
          <div>
            {t.title&&<div style={{...T.label(),marginBottom:2,color:t.type==="error"?C.red:t.type==="success"?C.green:C.orange}}>{t.title}</div>}
            <div style={{fontSize:13,color:C.text}}>{t.msg}</div>
          </div>
        </div>
      ))}
    </div>
  );
}
function Badge({cert}){const i=certInfo(cert);return<span style={pill(i.bg,i.color)}>{i.label}</span>}
function StatusBadge({status}){const i=statusInfo(status);return<span style={{...pill(i.bg,i.color),display:"flex",alignItems:"center",gap:5}}><span style={{width:5,height:5,borderRadius:"50%",background:i.dot,flexShrink:0,display:"inline-block"}}></span>{i.label}</span>}
function Stars({rating,interactive=false,onRate}){
  return(
    <span style={{display:"flex",gap:2}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} onClick={()=>interactive&&onRate&&onRate(s)} style={{color:s<=Math.round(rating)?"#F59E0B":"rgba(255,255,255,0.15)",fontSize:interactive?20:13,cursor:interactive?"pointer":"default",transition:"transform 0.1s",display:"inline-block"}}>★</span>
      ))}
    </span>
  );
}
function Divider({margin=14}){return<div style={{height:1,background:C.border,margin:`${margin}px 0`}}/>}
function Avatar({name,size=38,bg="linear-gradient(135deg,#F97316,#7C3AED)"}){
  return<div style={{width:size,height:size,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.38,fontWeight:700,color:"white",flexShrink:0,fontFamily:"'Syne',sans-serif"}}>{name?.[0]||"?"}</div>;
}
function BackBtn({onBack,label="Volver"}){
  return<button onClick={onBack} style={{...btnGhost(),display:"flex",alignItems:"center",gap:6,padding:"7px 12px"}}><span style={{fontSize:16}}>←</span><span>{label}</span></button>;
}
function EmptyState({icon,title,sub,action,actionLabel}){

function Spinner(){return<div style={{textAlign:"center",padding:"40px 20px"}}><div className="spinning" style={{fontSize:32}}>⚙️</div><div style={{...T.sub(),marginTop:10}}>Un momento...</div></div>}

          {[1,2,3,4,5].map(s=>(
            <span key={s} onClick={()=>setR(s)} style={{fontSize:36,cursor:"pointer",color:s<=r?"#F59E0B":"rgba(255,255,255,0.15)",transform:s<=r?"scale(1.1)":"scale(1)",transition:"all 0.15s",display:"inline-block"}}>★</span>
          ))}
        </div>
        <div style={{...T.label(),marginBottom:8}}>Comentario (opcional)</div>
        <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="¿Qué fue bien? ¿Algo a mejorar?" style={{...inputStyle,height:80,marginBottom:20}}/>
        <button onClick={()=>r>0&&onSubmit(r,comment)} style={{...btn(),opacity:r>0?1:0.4}}>Enviar calificación ⭐</button>

    </div>
  );
}

// REVIEWS SECTION
// ═══════════════════════════════════════════════════
function ReviewsSection({tallerId,reviews,onAddReview,currentUser}){
  const [showForm,setShowForm]=useState(false);
  const [rating,setRating]=useState(0);
  const [comment,setComment]=useState("");
  const [svcSel,setSvcSel]=useState("");
  const list=reviews[tallerId]||[];
  const taller=TALLERES.find(t=>t.id===tallerId);
  const avg=list.length?(list.reduce((s,r)=>s+r.rating,0)/list.length).toFixed(1):taller?.rating||0;
  const dist=[5,4,3,2,1].map(n=>({n,count:list.filter(r=>Math.round(r.rating)===n).length}));

  const submit=()=>{
    if(rating===0)return;
    onAddReview(tallerId,{
      id:"rv"+Date.now(),
      user:currentUser||"Tú",
      rating,
      date:new Date().toLocaleDateString("es-CO",{day:"numeric",month:"short",year:"numeric"}),
      svc:svcSel?getSvc(svcSel).name:"Servicio general",
      comment,
    });
    setShowForm(false);setRating(0);setComment("");setSvcSel("");
  };

  return(
    <div>
      {/* Rating summary */}
      <div style={{...card({background:"rgba(245,158,11,0.05)",border:"1px solid rgba(245,158,11,0.2)",marginBottom:12})}}>
        <div style={{display:"flex",gap:16,alignItems:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:40,color:C.yellow,lineHeight:1}}>{avg}</div>
            <Stars rating={parseFloat(avg)}/>
            <div style={{...T.sub(11),marginTop:4}}>{list.length} reseñas</div>
          </div>
          <div style={{flex:1}}>
            {dist.map(({n,count})=>(
              <div key={n} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                <span style={{fontSize:11,color:C.textSub,width:8}}>{n}</span>
                <span style={{fontSize:10,color:C.yellow}}>★</span>
                <div style={{flex:1,height:5,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:list.length?`${(count/list.length)*100}%`:"0%",background:C.yellow,borderRadius:3}}/>
                </div>
                <span style={{fontSize:11,color:C.textMuted,width:14,textAlign:"right"}}>{count}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Write review button */}
      {!showForm&&(
        <button onClick={()=>setShowForm(true)} style={{...btnOutline({width:"100%",marginBottom:14})}}>✍️ Escribir reseña</button>
      )}

      {/* Review form */}
      {showForm&&(
        <div style={{...card({border:"1px solid rgba(249,115,22,0.3)",marginBottom:14,animation:"slideUp 0.2s ease"})}}>
          <div style={{...T.title(15),marginBottom:14}}>Tu reseña</div>
          <div style={{...T.label(),marginBottom:10}}>Calificación *</div>
          <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
            {[1,2,3,4,5].map(s=>(
              <span key={s} onClick={()=>setRating(s)} style={{fontSize:32,cursor:"pointer",color:s<=rating?C.yellow:"rgba(255,255,255,0.15)",transform:s<=rating?"scale(1.15)":"scale(1)",transition:"all 0.15s",display:"inline-block"}}>★</span>
            ))}
          </div>
          <div style={{...T.label(),marginBottom:8}}>Servicio</div>
          <select value={svcSel} onChange={e=>setSvcSel(e.target.value)} style={{...inputStyle,marginBottom:12}}>
            <option value="">Selecciona el servicio...</option>
            {(taller?.svcs||[]).map(sv=><option key={sv} value={sv}>{getSvc(sv).icon} {getSvc(sv).name}</option>)}
          </select>
          <div style={{...T.label(),marginBottom:8}}>Comentario</div>
          <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="¿Cómo fue tu experiencia? ¿Qué recomiendas?" style={{...inputStyle,height:85,marginBottom:14}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowForm(false)} style={btnGhost({flex:1})}>Cancelar</button>
            <button onClick={submit} style={{...btn({flex:2,padding:"11px"}),opacity:rating>0?1:0.4}}>Publicar ⭐</button>
          </div>
        </div>
      )}

      {/* Reviews list */}
      {list.length===0?(
        <div style={{textAlign:"center",padding:"24px 0",color:C.textSub,fontSize:13}}>Aún no hay reseñas. ¡Sé el primero!</div>
      ):list.map(r=>(
        <div key={r.id} style={{...card({marginBottom:10})}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <Avatar name={r.user} size={32}/>
              <div>
                <div style={{...T.title(13)}}>{r.user}</div>
                <div style={{...T.sub(11)}}>{r.date}</div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <Stars rating={r.rating}/>
              {r.svc&&<div style={{...T.sub(10),marginTop:2}}>{r.svc}</div>}
            </div>
          </div>
          {r.comment&&<div style={{fontSize:13,color:C.textSub,lineHeight:1.6,fontStyle:"italic"}}>"{r.comment}"</div>}
        </div>
      ))}
    </div>
  );
}

function SearchScreen({navigate}){
  const [q,setQ]=useState("");
  const [brand,setBrand]=useState("Todas");
  const [type,setType]=useState("todos");
  const [sort,setSort]=useState("distance");
  const filtered=TALLERES.filter(t=>{
    if(brand!=="Todas"&&t.brand!==brand)return false;
    if(type==="multimarcas"&&t.type!=="multimarcas")return false;
    if(type==="especializada"&&t.type!=="especializada")return false;
    if(q&&!t.name.toLowerCase().includes(q.toLowerCase())&&!t.city.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>sort==="distance"?a.dist-b.dist:sort==="rating"?b.rating-a.rating:b.reviews-a.reviews);
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflowY:"auto",paddingBottom:80}}>
      <div style={headerStyle}><div style={T.display(20)}>🔍 Buscar Taller</div></div>

          {["todos","especializada","multimarcas"].map(t=>(
            <button key={t} onClick={()=>setType(t)} style={{padding:"5px 14px",cursor:"pointer",borderRadius:20,whiteSpace:"nowrap",fontSize:12,fontWeight:700,fontFamily:"'Syne',sans-serif",background:type===t?"rgba(249,115,22,0.15)":C.surface,border:type===t?`1px solid ${C.orange}`:`1px solid ${C.border}`,color:type===t?C.orange:C.textSub,flexShrink:0}}>
              {t==="todos"?"Todos":t==="especializada"?"🎯 Especializado":"⚙️ Multimarcas"}

          ))}
        </div>
        <div style={{display:"flex",gap:6,marginTop:6,overflowX:"auto",paddingBottom:4}}>

            const bc=BC[b]||C.orange;const act=brand===b;
            return<button key={b} onClick={()=>setBrand(b)} style={{background:act?bc+"22":C.surface,border:act?`1px solid ${bc}`:`1px solid ${C.border}`,color:act?bc:C.textSub,borderRadius:8,padding:"4px 12px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif",whiteSpace:"nowrap",flexShrink:0}}>{b}</button>;
          })}

      </div>
      <div style={{padding:"8px 16px 4px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{...T.sub(12)}}><span style={{color:C.orange,fontWeight:700}}>{filtered.length}</span> talleres</div>
        <div style={{display:"flex",gap:4}}>
          {[["distance","📍"],["rating","⭐"],["reviews","💬"]].map(([v,l])=>(
            <button key={v} onClick={()=>setSort(v)} style={{padding:"3px 10px",cursor:"pointer",borderRadius:8,fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif",background:sort===v?"rgba(249,115,22,0.12)":"transparent",border:sort===v?`1px solid ${C.orangeBorder}`:`1px solid transparent`,color:sort===v?C.orange:C.textSub}}>{l}</button>

      </div>
      {/* Sticky CTA - only show in servicios tab */}
      {tab==="servicios"&&(

      )}
    </div>
  );
}

// MOTO APP (MOTOCICLISTA)
// ═══════════════════════════════════════════════════
function MotoApp({user,onLogout,toast}){
  const [tab,setTab]=useState("home");
  const [screen,setScreen]=useState(null);
  const [screenParams,setScreenParams]=useState({});
  const [moto,setMoto]=useState({brand:"Honda",model:"CB190R",year:"2023",plate:"KGF456",km:8750,color:"Rojo",nextSvc:11000});
  const [bookings,setBookings]=useState(INIT_HISTORY);
  const [reviews,setReviews]=useState(INIT_REVIEWS);
  const [ratingTarget,setRatingTarget]=useState(null);

  const navigate=(sc,params={})=>{setScreen(sc);setScreenParams(params);};
  const goHome=()=>{setScreen(null);setScreenParams({});};
  const addBooking=(b)=>{
    setBookings(prev=>[...prev,{id:"b"+(prev.length+1),...b}]);
    toast("¡Reserva confirmada! El taller te contactará pronto.","success","Reserva exitosa");
  };
  const addReview=(tallerId,rev)=>{
    setReviews(prev=>({...prev,[tallerId]:[rev,...(prev[tallerId]||[])]}));
    toast("¡Reseña publicada! Gracias por tu opinión.","success");
  };
  const submitRating=(booking,rating,comment)=>{
    setBookings(prev=>prev.map(b=>b.id===booking.id?{...b,rating,notes:comment||b.notes}:b));
    setRatingTarget(null);
    toast("¡Gracias por tu calificación!","success");
  };

  const tabs=[["home","🏠","Inicio"],["search","🔍","Buscar"],["moto","🏍️","Mi Moto"],["history","📋","Historial"]];

  const renderScreen=()=>{
    if(screen==="tallerDetail")return<TallerDetailScreen t={screenParams.taller} onBack={()=>{setScreen("search");setScreenParams({});}} navigate={navigate} reviews={reviews} onAddReview={addReview} currentUser={user.name}/>;
    if(screen==="booking")return<BookingScreen params={screenParams} onBack={()=>{setScreen("tallerDetail",{taller:screenParams.taller});}} addBooking={addBooking} toast={toast}/>;
    if(screen==="bookingDetail")return<BookingDetailScreen booking={screenParams.booking} onBack={goHome} onRate={setRatingTarget}/>;
    if(screen==="addMoto")return<MotoScreen moto={null} setMoto={(m)=>{setMoto(m);goHome();toast("¡Moto registrada correctamente!","success");}} navigate={navigate} history={bookings}/>;
    return null;
  };

  if(screen&&["tallerDetail","booking","bookingDetail","addMoto"].includes(screen)){
    return(
      <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        {renderScreen()}
        {ratingTarget&&<RatingModal service={ratingTarget.svcId} tallerName={getTaller(ratingTarget.tallerId)?.name} onSubmit={(r,c)=>submitRating(ratingTarget,r,c)} onClose={()=>setRatingTarget(null)}/>}
      </div>
    );
  }

  return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {tab==="home"&&<HomeScreen user={user} moto={moto} bookings={bookings} navigate={(sc,p={})=>{if(["tallerDetail","booking","bookingDetail"].includes(sc)){setScreen(sc);setScreenParams(p);}else{setTab(sc);}}} toast={toast}/>}
      {tab==="search"&&<SearchScreen navigate={(sc,p)=>{setScreen(sc);setScreenParams(p);}}/>}
      {tab==="moto"&&<MotoScreen moto={moto} setMoto={setMoto} navigate={(sc,p)=>{if(sc==="search"){setTab("search");}else{setScreen(sc);setScreenParams(p);}}} history={bookings}/>}
      {tab==="history"&&<HistoryScreen history={bookings} navigate={(sc,p)=>{setScreen(sc);setScreenParams(p);}} onRate={setRatingTarget}/>}
      <div style={tabBarStyle}>
        {tabs.map(([id,icon,label])=>(
          <button key={id} onClick={()=>{setScreen(null);setTab(id);}} style={tabBtn(tab===id&&!screen)}>
            <span style={{fontSize:22}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{label}</span>
          </button>
        ))}
        <button onClick={onLogout} style={{...tabBtn(false),flex:0.7}}>
          <span style={{fontSize:20}}>⏻</span>
          <span style={{fontSize:9,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>Salir</span>
        </button>
      </div>
      {ratingTarget&&<RatingModal service={ratingTarget.svcId} tallerName={getTaller(ratingTarget.tallerId)?.name} onSubmit={(r,c)=>submitRating(ratingTarget,r,c)} onClose={()=>setRatingTarget(null)}/>}
    </div>
  );
}

                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                    {w.cert&&<Badge cert={w.cert}/>}
                    <span style={pill(w.status==="active"?"rgba(16,185,129,0.15)":w.status==="pending"?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.15)",w.status==="active"?C.green:w.status==="pending"?C.yellow:C.red)}>{w.status==="active"?"ACTIVO":w.status==="pending"?"PENDIENTE":"SUSPENDIDO"}</span>
                  </div>
                  <div style={{...T.title(15),marginBottom:2}}>{w.name}</div>
                  <div style={T.sub(12)}>{w.city} · {w.svcs} servicios</div>
                  {w.revenue>0&&<div style={{color:C.orange,fontWeight:700,fontSize:13,marginTop:3}}>{fmt(w.revenue)}</div>}
                  {w.rating&&<Stars rating={w.rating}/>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {w.status==="active"&&<button onClick={()=>suspend(w.id)} style={{...btnGhost({padding:"5px 10px",fontSize:11})}}>Suspender</button>}
                </div>
              </div>
              {w.status==="pending"&&(
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>certify(w.id,"verificado")} style={{...btnGhost({flex:1,padding:"8px",fontSize:12})}}>Verificado</button>
                  <button onClick={()=>certify(w.id,"certificado")} style={{...btnOut({flex:1,padding:"8px",fontSize:12})}}>Certificado</button>
                  <button onClick={()=>certify(w.id,"elite")} style={{...btn({flex:1,padding:"8px",fontSize:12,background:"#7C3AED"})}}>Élite ⭐</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {tab==="reportes"&&(
        <div style={{flex:1,overflowY:"auto",paddingBottom:80,padding:"16px 16px 0",animation:"fadeIn 0.2s ease"}}>
          <div style={{...card({background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.3)",marginBottom:20})}}>
            <div style={{...T.label(),color:"#A78BFA",marginBottom:8}}>NPS Plataforma</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:48,color:"#A78BFA"}}>58</div>
            <div style={T.sub()}>Promotores · Objetivo: 65 para Q2</div>
          </div>
          {[["Servicio top","Cambio de aceite (34%)"],["Taller con mayor rating","Yamaha Meyer (4.8)"],["Ciudad líder","Cúcuta (67%)"],["Ticket promedio",fmt(89000)],["Repuestos/mes","847 unidades"],["Comisiones generadas",fmt(5600000)],["Retención D30","62%"],["Talleres en riesgo","1 (rating < 3.5)"]].map(([k,v])=>(
            <div key={k} style={{...card({display:"flex",justifyContent:"space-between",alignItems:"center"})}}>
              <span style={T.sub(13)}>{k}</span>
              <span style={{color:C.orange,fontWeight:700,fontSize:14}}>{v}</span>
            </div>
          ))}
        </div>
      )}

      {tab==="usuarios"&&(
        <div style={{flex:1,overflowY:"auto",paddingBottom:80,padding:"16px 16px 0",animation:"fadeIn 0.2s ease"}}>
          <div style={{...T.label(),marginBottom:12}}>Base de usuarios</div>
          {[{name:"Alejandro Durán",phone:"315 123 4567",motos:"Honda CB190R",svcs:3,last:"5 Mar",status:"active"},{name:"María González",phone:"316 234 5678",motos:"Yamaha FZ 25",svcs:1,last:"28 Feb",status:"active"},{name:"Carlos Pérez",phone:"317 345 6789",motos:"Bajaj NS200",svcs:5,last:"1 Mar",status:"active"},{name:"Andrea Torres",phone:"318 456 7890",motos:"AKT NKD 125",svcs:0,last:"—",status:"inactive"}].map((u,i)=>(
            <div key={i} style={card()}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <Avatar name={u.name}/>
                <div style={{flex:1}}>
                  <div style={{...T.title(14),marginBottom:2}}>{u.name}</div>
                  <div style={{...T.sub(12),marginBottom:2}}>📞 {u.phone} · 🏍️ {u.motos}</div>
                  <div style={T.sub(11)}>{u.svcs} servicios · Último: {u.last}</div>
                </div>
                <span style={pill(u.status==="active"?"rgba(16,185,129,0.15)":"rgba(100,116,139,0.15)",u.status==="active"?C.green:C.textMuted)}>{u.status==="active"?"Activo":"Inactivo"}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={tabBarStyle}>
        {[["dashboard","📊","Dashboard"],["reportes","📈","Reportes"],["usuarios","👥","Usuarios"]].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={tabBtn(tab===id)}>
            <span style={{fontSize:22}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// AUTH SCREEN
// ═══════════════════════════════════════════════════
function AuthScreen({onLogin}){
  const [role,setRole]=useState("motociclista");
  const [phone,setPhone]=useState("");
  const [name,setName]=useState("");
  const [otp,setOtp]=useState(["","","",""]);
  const [step,setStep]=useState("form");
  const [loading,setLoading]=useState(false);
  const otpRef0=useRef(null);
  const otpRef1=useRef(null);
  const otpRef2=useRef(null);
  const otpRef3=useRef(null);
  const otpRefs=[otpRef0,otpRef1,otpRef2,otpRef3];
  const demos={motociclista:{name:"Alejandro Durán",phone:"3151234567",role:"motociclista"},taller:{name:"Mecánico García",phone:"3162345678",role:"taller",tallerName:"Honda Motos Cúcuta"},admin:{name:"Admin MotoService",phone:"3173456789",role:"admin"}};

  const handleOtpChange=(i,v)=>{
    const n=[...otp];n[i]=v.slice(-1);setOtp(n);
    if(v&&i<3)otpRefs[i+1].current?.focus();
    if(!v&&i>0)otpRefs[i-1].current?.focus();
  };
  const otpVal=otp.join("");
  const verify=()=>{if(otpVal.length===4){setLoading(true);setTimeout(()=>{onLogin({name:name||"Usuario",phone,role:"motociclista"});setLoading(false);},1000);}};

  return(
    <div style={{background:"linear-gradient(170deg,#0d0d20,#08080f)",minHeight:"100vh",display:"flex",flexDirection:"column",padding:"0 24px",justifyContent:"center"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"40%",background:"radial-gradient(ellipse at 50% 0%,rgba(249,115,22,0.12),transparent 60%)",pointerEvents:"none"}}/>
      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:40,paddingTop:40}}>
        <div style={{fontSize:60,marginBottom:12}}>🏍️</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:44,color:C.orange,letterSpacing:2,lineHeight:1}}>MOTO<br/>SERVICE</div>
        <div style={{...T.sub(11),letterSpacing:4,marginTop:8}}>COLOMBIA · RED CERTIFICADA</div>
      </div>

      {/* Demo */}
      <div style={{background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.25)",borderRadius:18,padding:20,marginBottom:24}}>
        <div style={{color:"#A78BFA",fontWeight:700,fontSize:12,marginBottom:12,letterSpacing:1}}>⚡ ACCESO DEMO RÁPIDO</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
          {["motociclista","taller","admin"].map(r=>(
            <button key={r} onClick={()=>setRole(r)} style={{background:role===r?C.orangeDim:C.surface,border:role===r?`1.5px solid ${C.orange}`:`1px solid ${C.border}`,color:role===r?C.orange:C.textSub,borderRadius:12,padding:"10px 4px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif",textAlign:"center",transition:"all 0.15s"}}>
              <div style={{fontSize:20,marginBottom:3}}>{r==="motociclista"?"🏍️":r==="taller"?"🔧":"⚙️"}</div>
              {r==="motociclista"?"Motero":r==="taller"?"Taller":"Admin"}
            </button>
          ))}
        </div>
        <button onClick={()=>onLogin(demos[role])} style={btn()}>
          Entrar como {role==="motociclista"?"Motociclista":role==="taller"?"Taller Afiliado":"Administrador"} →
        </button>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <div style={{flex:1,height:1,background:C.border}}/>
        <span style={T.sub(11)}>o regístrate con tu celular</span>
        <div style={{flex:1,height:1,background:C.border}}/>
      </div>

      {step==="form"?(
        <>
          <div style={{...T.label(),marginBottom:8}}>Número de celular</div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <div style={{...inputStyle,width:56,padding:"12px 8px",textAlign:"center",flexShrink:0,color:C.textSub}}>🇨🇴</div>
            <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,""))} placeholder="3xx xxx xxxx" maxLength={10} style={{...inputStyle,flex:1}}/>
          </div>
          <div style={{...T.label(),marginBottom:8}}>Tu nombre</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nombre completo" style={{...inputStyle,marginBottom:20}}/>
          <button onClick={()=>{if(phone.length>=10)setStep("otp");}} style={{...btn(),opacity:phone.length>=10?1:0.4}}>Enviar código SMS →</button>
        </>
      ):(
        <>
          <div style={{...card({background:C.greenDim,border:`1px solid rgba(16,185,129,0.3)`,textAlign:"center",marginBottom:20})}}>
            <div style={{color:C.green,fontWeight:700,marginBottom:4}}>✓ Código enviado</div>
            <div style={T.sub()}>+57 {phone}</div>
            <div style={{...T.sub(11),color:C.orange,marginTop:4}}>Demo: ingresa cualquier 4 dígitos</div>
          </div>
          <div style={{...T.label(),marginBottom:12,textAlign:"center"}}>Código de verificación</div>
          <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:20}}>
            {[0,1,2,3].map(i=>(
              <input key={i} ref={otpRefs[i]} maxLength={1} inputMode="numeric" style={{...inputStyle,width:60,height:60,textAlign:"center",fontSize:26,fontWeight:700,padding:0,borderColor:otp[i]?C.orange:C.border}} value={otp[i]} onChange={e=>handleOtpChange(i,e.target.value)}/>
            ))}
          </div>
          <button onClick={verify} style={{...btn(),opacity:otpVal.length===4?1:0.4,marginBottom:12}}>{loading?"Verificando...":"Verificar y entrar →"}</button>
          <button onClick={()=>{setStep("form");setOtp(["","","",""]);}} style={btnGhost({width:"100%"})}>← Cambiar número</button>
        </>
      )}
      <div style={{height:40}}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [toasts,setToasts]=useState([]);

  const toast=(msg,type="info",title="")=>{
    const id=Date.now();
    setToasts(prev=>[...prev,{id,msg,type,title}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),3500);
  };

  return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <Toast toasts={toasts}/>
      {!user&&<AuthScreen onLogin={setUser}/>}
      {user?.role==="taller"&&<TallerApp user={user} onLogout={()=>setUser(null)} toast={toast}/>}
      {user?.role==="admin"&&<AdminApp onLogout={()=>setUser(null)} toast={toast}/>}
      {user?.role==="motociclista"&&<MotoApp user={user} onLogout={()=>setUser(null)} toast={toast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
